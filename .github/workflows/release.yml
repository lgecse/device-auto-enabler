name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege: only the ability to create the release/upload assets.
permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "0.0.0" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $version"

      - name: Publish self-contained single-file (win-x64)
        shell: pwsh
        run: |
          dotnet publish src/DeviceAutoEnabler/DeviceAutoEnabler.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish
          if (-not (Test-Path "publish/DeviceAutoEnabler.exe")) {
            throw "Publish did not produce DeviceAutoEnabler.exe"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "/DSourceDir=$($PWD.Path)\publish" `
            "installer\DeviceAutoEnabler.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed ($LASTEXITCODE)" }

      - name: Generate SHA256 checksum
        id: checksum
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path "dist" -Filter "DeviceAutoEnabler-Setup-*.exe" | Select-Object -First 1
          if ($null -eq $setup) { throw "Installer not found in dist/" }
          $hash = (Get-FileHash -Path $setup.FullName -Algorithm SHA256).Hash.ToLower()
          $checksumFile = "$($setup.FullName).sha256"
          "$hash  $($setup.Name)" | Out-File -FilePath $checksumFile -Encoding ascii -NoNewline
          Write-Host "SHA256($($setup.Name)) = $hash"
          "installer=$($setup.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "checksum=$checksumFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${{ steps.checksum.outputs.installer }}" `
            "${{ steps.checksum.outputs.checksum }}" `
            --title "Device Auto Enabler ${{ steps.ver.outputs.version }}" `
            --generate-notes
